apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-api-config
  namespace: esperanca
data:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Development"
  ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address: "http://identity-api:8080/"
  ReverseProxy__Clusters__campanhas-cluster__Destinations__destination1__Address: "http://campanhas-api:8080/"
  HealthChecks__IdentityApi__Uri: "http://identity-api:8080/health"
  HealthChecks__CampanhasApi__Uri: "http://campanhas-api:8080/health"
